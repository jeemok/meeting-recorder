# Copy to config.yaml and tweak. Anything you omit falls back to these defaults.

audio:
  # Sample rate for capture & whisper (16k is whisper's native rate).
  sample_rate: 16000
  channels: 1
  # Device indices from `meeting-recorder devices`. null = system default.
  mic_device: null
  # Set this to the BlackHole / loopback input index to capture system audio.
  # Leave null to record mic only.
  system_device: null

transcription:
  # tiny.en, base.en, small.en, medium.en, large-v3
  # .en variants are English-only and ~2x faster.
  model: small.en
  # cpu, cuda, auto
  device: auto
  compute_type: int8

diarization:
  # Set to true after `pip install -e ".[diarization]"` and accepting the
  # pyannote license. Falls back to "Speaker 1, 2, ..." labels if disabled.
  enabled: false
  model: pyannote/speaker-diarization-3.1
  min_speakers: 1
  max_speakers: 6

llm:
  enabled: true
  provider: anthropic
  model: claude-opus-4-7
  # Real-time question suggestions while recording.
  realtime:
    enabled: true
    interval_seconds: 30      # how often to refresh suggestions
    context_window_seconds: 180  # how much recent transcript to include

storage:
  # Where to write meeting markdown files. Override with env MEETING_RECORDER_DIR.
  dir: ./meetings

ui:
  host: 127.0.0.1
  port: 8765
